feeds:
  - name: "My Favorite Podcast"
    url: "https://feeds.example.com/podcast.rss"
    enabled: true

paths:
  output_dir: "./output"
  database: "./data/podcasts.db"

transcription:
  # Supported providers: groq, openai, openrouter
  provider: "openai"
  model: "whisper-1"
  language: "en"

interpretation:
  # Supported providers: groq, openai, openrouter
  provider: "openai"
  model: "gpt-4o"
  temperature: 0
  max_tokens: 2048
  topic_excerpt_words: 2000

ad_detection:
  chunk_duration_sec: 300
  chunk_overlap_sec: 30
  min_confidence: 0.75
  merge_gap_sec: 5

audio:
  output_format: "mp3"
  cbr_bitrate: "192k"

logging:
  level: "INFO"
  log_file: null

retry:
  max_attempts: 3
  backoff_factor: 2

scheduler:
  # Set enabled: true to have the WebUI automatically run all feeds periodically.
  enabled: false
  interval_minutes: 30

publishing:
  # Base URL where the output folder is served (no trailing slash).
  # When set, a static .rss file is generated per feed after each run.
  # Unset (null) disables RSS generation entirely.
  base_url: null
  # Maximum number of cleaned episode files to keep per feed on disk.
  # Older files are deleted before RSS generation. null = keep all.
  max_episodes_per_feed: null

prompts:
  # Ad detection instructions.
  ad_detection: |
    Identify advertisements in this podcast transcript segment.
    An ad is any span where the host or another person or persons promote a product, service, or sponsor.
    Exclude brand mentions that are naturally part of the episode content.

  # Topic extraction instructions.
  topic_extraction: |
    Analyze the opening of this podcast transcript.
