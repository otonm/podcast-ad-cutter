feeds:
  - name: "Test Podcast"
    url: "https://feeds.example.com/test.rss"
    enabled: true

paths:
  output_dir: "./test_output"
  database: ":memory:"

transcription:
  provider: "openai"
  model: "whisper-1"
  language: "en"

interpretation:
  provider: "openai"
  model: "gpt-4o"
  temperature: 0
  max_tokens: 2048
  topic_excerpt_words: 2000

ad_detection:
  chunk_duration_sec: 300
  chunk_overlap_sec: 30
  min_confidence: 0.75
  merge_gap_sec: 5

audio:
  output_format: "mp3"
  cbr_bitrate: "192k"

logging:
  level: "INFO"
  log_file: null

retry:
  max_attempts: 3
  backoff_factor: 2
