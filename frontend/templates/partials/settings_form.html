<form hx-post="/settings"
      hx-target="#settings-accordion"
      hx-swap="innerHTML"
      class="space-y-4 pt-2">

  {% if error %}
  <div class="text-sm text-red-600 bg-red-50 border border-red-200 rounded-lg px-3 py-2">
    {{ error }}
  </div>
  {% endif %}

  <fieldset class="border border-gray-200 rounded-lg p-4">
    <legend class="text-xs font-semibold text-gray-500 uppercase tracking-wide px-1">Transcription</legend>
    <div class="grid grid-cols-2 gap-3 mt-2">
      <div>
        <label class="block text-xs font-medium text-gray-700 mb-1">Provider</label>
        <select name="transcription_provider"
                hx-get="/settings/models/transcription"
                hx-trigger="change, load"
                hx-params="transcription_provider"
                hx-target="#transcription-model-options"
                class="w-full border border-gray-300 rounded-lg px-2 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
          {% for p in providers %}
          <option value="{{ p }}" {% if p == cfg.transcription.provider %}selected{% endif %}>{{ p }}</option>
          {% endfor %}
        </select>
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-700 mb-1">Model</label>
        <input type="text"
               name="transcription_model"
               value="{{ cfg.transcription.model }}"
               list="transcription-models"
               autocomplete="off"
               class="w-full border border-gray-300 rounded-lg px-2 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400" />
        <span id="transcription-model-options"></span>
      </div>
    </div>
  </fieldset>

  <fieldset class="border border-gray-200 rounded-lg p-4">
    <legend class="text-xs font-semibold text-gray-500 uppercase tracking-wide px-1">Interpretation</legend>
    <div class="grid grid-cols-2 gap-3 mt-2">
      <div>
        <label class="block text-xs font-medium text-gray-700 mb-1">Provider</label>
        <select name="interpretation_provider"
                hx-get="/settings/models/interpretation"
                hx-trigger="change, load"
                hx-params="interpretation_provider"
                hx-target="#interpretation-model-options"
                class="w-full border border-gray-300 rounded-lg px-2 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
          {% for p in providers %}
          <option value="{{ p }}" {% if p == cfg.interpretation.provider %}selected{% endif %}>{{ p }}</option>
          {% endfor %}
        </select>
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-700 mb-1">Model</label>
        <input type="text"
               name="interpretation_model"
               value="{{ cfg.interpretation.model }}"
               list="interpretation-models"
               autocomplete="off"
               class="w-full border border-gray-300 rounded-lg px-2 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400" />
        <span id="interpretation-model-options"></span>
      </div>
    </div>
  </fieldset>

  <fieldset class="border border-gray-200 rounded-lg p-4">
    <legend class="text-xs font-semibold text-gray-500 uppercase tracking-wide px-1">Processing</legend>
    <div class="flex items-center gap-2 mt-2">
      <input type="checkbox" name="verbose_log" id="verbose_log"
             {% if cfg.logging.level == "DEBUG" %}checked{% endif %}
             class="w-4 h-4 accent-blue-600" />
      <label for="verbose_log" class="text-xs font-medium text-gray-700 select-none">Verbose log</label>
    </div>
  </fieldset>

  <fieldset class="border border-gray-200 rounded-lg p-4">
    <legend class="text-xs font-semibold text-gray-500 uppercase tracking-wide px-1">Ad Detection</legend>
    <div class="max-w-xs mt-2">
      <label class="block text-xs font-medium text-gray-700 mb-1">
        Min confidence ({{ cfg.ad_detection.min_confidence }})
      </label>
      <input type="range"
             name="min_confidence"
             min="0.0" max="1.0" step="0.05"
             value="{{ cfg.ad_detection.min_confidence }}"
             oninput="this.previousElementSibling.previousElementSibling.textContent = 'Min confidence (' + parseFloat(this.value).toFixed(2) + ')'"
             class="w-full accent-blue-600" />
    </div>
  </fieldset>

  <fieldset class="border border-gray-200 rounded-lg p-4">
    <legend class="text-xs font-semibold text-gray-500 uppercase tracking-wide px-1">Publishing</legend>
    <div class="space-y-3 mt-2">
      <div>
        <label class="block text-xs font-medium text-gray-700 mb-1">Base URL</label>
        <input type="text"
               name="base_url"
               value="{{ cfg.publishing.base_url or '' }}"
               placeholder="https://example.com"
               class="w-full border border-gray-300 rounded-lg px-2 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400" />
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-700 mb-1">Max episodes per feed</label>
        <input type="number"
               name="max_episodes_per_feed"
               value="{{ cfg.publishing.max_episodes_per_feed or '' }}"
               min="1"
               placeholder="unlimited"
               class="w-32 border border-gray-300 rounded-lg px-2 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400" />
      </div>
    </div>
  </fieldset>

  <fieldset class="border border-gray-200 rounded-lg p-4">
    <legend class="text-xs font-semibold text-gray-500 uppercase tracking-wide px-1">Prompts</legend>
    <p class="text-xs text-gray-400 mt-1 mb-3">JSON output instructions are appended automatically at runtime.</p>
    <div class="space-y-3">
      <div>
        <label class="block text-xs font-medium text-gray-700 mb-1">Ad detection</label>
        <textarea name="ad_detection_prompt"
                  rows="4"
                  class="w-full border border-gray-300 rounded-lg px-2 py-1.5 text-sm font-mono focus:outline-none focus:ring-2 focus:ring-blue-400 resize-y">{{ raw_prompts.ad_detection }}</textarea>
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-700 mb-1">Topic extraction</label>
        <textarea name="topic_extraction_prompt"
                  rows="3"
                  class="w-full border border-gray-300 rounded-lg px-2 py-1.5 text-sm font-mono focus:outline-none focus:ring-2 focus:ring-blue-400 resize-y">{{ raw_prompts.topic_extraction }}</textarea>
      </div>
    </div>
  </fieldset>

  <div class="flex gap-2 pt-1">
    <button type="submit"
            class="px-4 py-1.5 text-sm bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors">
      Save
    </button>
  </div>
</form>
